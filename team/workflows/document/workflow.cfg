[workflow]
name = document
description = Document workflow supporting short-form (story, blog post) and long-form (whitepaper, SOP) documents. No git repo; CM manages a versioned artifact lifecycle. Finalize publishes the polished document to projects/<name>/artifacts/.
status = ready

[capabilities]
version_semantics = semver
git_mode = none
finalize = publish
agents = pm,writer,tester,cm
