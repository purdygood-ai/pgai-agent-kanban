[workflow]
name = testing-only
description = Testing-only workflow: runs the project's test suites in a detached read-only worktree at the requirement's named ref. Uses label versioning (the version is a name for the artifact, not a semver release tag). Never mutates release-state, git history, or the version ceiling.
status = ready

[capabilities]
version_semantics = label
git_mode = ro
finalize = report
agents = pm,tester
